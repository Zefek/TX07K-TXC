name: Deploy TXO7K-TXC Example on Environment

on:
  workflow_dispatch:
    inputs:
      serial_port:
        required: true
        type: string
      environment:
        required: false
        type: string

permissions:
  contents: read
  deployments: write

jobs:
  deployment:
    runs-on: [self-hosted, iot]

    steps:

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Initialize Arduino CLI
        run: |
          & "$Env:RUNNER_TOOL_CACHE\arduino-cli\arduino-cli.exe" --config-file config.yaml core update-index

      - name: Compile Arduino project
        run: |
          & "$Env:RUNNER_TOOL_CACHE\arduino-cli\arduino-cli.exe" --config-file config.yaml compile ./examples --output-dir build

      - name: Upload firmware to Arduino
        env:
          SERIAL_PORT: ${{ github.event.inputs.serial_port }}
        run: |
          if ($env:SERIAL_PORT -notmatch '^COM\d+$') {
            Write-Error "Invalid serial port format: $env:SERIAL_PORT"
            exit 1
          }
          & "$Env:RUNNER_TOOL_CACHE\arduino-cli\arduino-cli.exe" --config-file config.yaml upload ./examples --port $env:SERIAL_PORT --input-dir build
